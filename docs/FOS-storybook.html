<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Future of Sales - Architecture Storybook</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100%;
    overflow: hidden;
    background: #FFFFFF;
  }

  /* ==============================
     SLIDE CONTAINER
     ============================== */
  .deck {
    display: flex;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    height: 100vh;
    width: 1000vw;
  }

  .slide {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 80px 100px;
    position: relative;
    overflow: hidden;
  }

  .slide-scroll {
    overflow-y: auto;
    align-items: flex-start;
    padding-top: 40px;
    padding-bottom: 120px;
  }

  .slide-inner { max-width: 1400px; width: 100%; }
  .slide-light { background: #FFFFFF; color: #2E2E38; }

  /* ==============================
     NAVIGATION BAR
     ============================== */
  .nav-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 56px;
    background: rgba(46, 46, 56, 0.97);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    z-index: 100;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
  }

  .nav-btn {
    height: 40px;
    padding: 0 14px;
    border-radius: 8px;
    border: 1.5px solid rgba(255, 255, 255, 0.2);
    background: transparent;
    color: #C4C4CD;
    font-family: 'Segoe UI', -apple-system, sans-serif;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .nav-btn:hover { border-color: #FFE600; color: #FFE600; }
  .nav-btn.active { background: #FFE600; border-color: #FFE600; color: #2E2E38; }

  .nav-arrow {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    border: none;
    background: rgba(255, 255, 255, 0.1);
    color: #FFFFFF;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .nav-arrow:hover { background: rgba(255, 230, 0, 0.2); color: #FFE600; }

  .nav-divider { width: 1px; height: 24px; background: rgba(255, 255, 255, 0.15); margin: 0 4px; }
  .nav-label { font-size: 11px; color: #747480; letter-spacing: 0.5px; margin: 0 6px; }

  /* ==============================
     TYPOGRAPHY
     ============================== */
  .slide-badge {
    display: inline-block;
    background: #FFE600;
    color: #2E2E38;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 14px;
    border-radius: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .slide-badge-outline {
    display: inline-block;
    border: 1.5px solid #2E2E38;
    color: #2E2E38;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 14px;
    border-radius: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .slide-title {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1.15;
    margin-bottom: 16px;
    color: #2E2E38;
  }

  .slide-subtitle {
    font-size: 18px;
    font-weight: 400;
    line-height: 1.6;
    max-width: 1000px;
    color: #747480;
    margin-bottom: 32px;
  }

  .highlight-text {
    text-decoration: underline;
    text-decoration-color: #FFE600;
    text-underline-offset: 6px;
    text-decoration-thickness: 4px;
  }

  .closing-line {
    margin-top: 28px;
    font-size: 16px;
    font-weight: 600;
    color: #747480;
    font-style: italic;
    text-align: center;
  }

  /* ==============================
     SLIDE 0: PROBLEM CARDS
     ============================== */
  .problem-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    margin-top: 32px;
  }

  .problem-card {
    background: #FAFAFA;
    border: 1.5px solid #E7E7EA;
    border-radius: 10px;
    padding: 24px;
    transition: box-shadow 0.2s ease;
  }

  .problem-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }

  .problem-number {
    display: inline-block;
    background: #2E2E38;
    color: #FFFFFF;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    text-align: center;
    line-height: 28px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .problem-name {
    font-size: 16px;
    font-weight: 700;
    color: #2E2E38;
    margin-bottom: 8px;
  }

  .problem-desc {
    font-size: 13px;
    color: #747480;
    line-height: 1.6;
  }

  /* ==============================
     SLIDE 1: JOURNEY CARDS
     ============================== */
  .journey-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 8px;
  }

  .journey-card {
    background: #FAFAFA;
    border: 1.5px solid #E7E7EA;
    border-radius: 10px;
    padding: 20px 24px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .journey-card:hover {
    border-color: #FFE600;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  }

  .journey-number {
    display: inline-block;
    background: #FFE600;
    color: #2E2E38;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    text-align: center;
    line-height: 24px;
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .journey-name {
    font-size: 15px;
    font-weight: 700;
    color: #2E2E38;
    margin-bottom: 4px;
  }

  .journey-tagline {
    font-size: 12px;
    color: #747480;
    font-style: italic;
    margin-bottom: 8px;
  }

  .journey-scenario {
    font-size: 12px;
    color: #747480;
    line-height: 1.5;
  }

  .journey-hint {
    font-size: 10px;
    color: #B0B0B8;
    margin-top: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ==============================
     OVERLAY SYSTEM (POPUPS)
     ============================== */
  .overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(30, 30, 40, 0.6);
    backdrop-filter: blur(6px);
    z-index: 200;
    overflow-y: auto;
    padding: 40px 20px;
    justify-content: center;
    align-items: flex-start;
  }

  .overlay.active { display: flex; }

  .overlay-content {
    background: #FFFFFF;
    border-radius: 12px;
    padding: 36px 40px;
    max-width: 720px;
    width: 100%;
    position: relative;
    margin: auto;
    box-shadow: 0 8px 40px rgba(0,0,0,0.25);
    border: 1px solid #E0E0E4;
  }

  .overlay-wide {
    max-width: 960px;
  }

  .overlay-close {
    position: absolute;
    top: 16px;
    right: 20px;
    background: none;
    border: none;
    font-size: 28px;
    color: #747480;
    cursor: pointer;
    line-height: 1;
    padding: 4px;
  }

  .overlay-close:hover { color: #2E2E38; }

  .overlay-badge {
    display: inline-block;
    background: #FFE600;
    color: #2E2E38;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .overlay-title {
    font-size: 22px;
    font-weight: 700;
    color: #2E2E38;
    margin-bottom: 12px;
  }

  .overlay-scenario {
    font-size: 13px;
    color: #747480;
    line-height: 1.6;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid #E7E7EA;
  }

  /* ==============================
     OVERLAY: FLOW STEPS
     ============================== */
  .overlay-flow {
    display: flex;
    align-items: stretch;
    gap: 0;
    margin-bottom: 24px;
  }

  .flow-step {
    flex: 1;
    background: #F5F5F8;
    border: 2px solid #D0D0D8;
    border-radius: 8px;
    padding: 14px 16px;
  }

  .flow-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #2E2E38;
    margin-bottom: 6px;
  }

  .flow-text {
    font-size: 12px;
    color: #444;
    line-height: 1.5;
  }

  .flow-arrow {
    display: flex;
    align-items: center;
    padding: 0 8px;
    font-size: 20px;
    color: #2E2E38;
    font-weight: 700;
  }

  /* ==============================
     MOCK SCREENS: SLACK
     ============================== */
  .mock-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #747480;
    margin-bottom: 10px;
  }

  .mock-slack {
    background: #FFFFFF;
    border: 2px solid #D0D0D8;
    border-radius: 10px;
    overflow: hidden;
  }

  .mock-slack-header {
    padding: 10px 16px;
    background: #F0F0F4;
    border-bottom: 2px solid #D0D0D8;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .mock-slack-botname {
    font-size: 12px;
    font-weight: 700;
    color: #2E2E38;
  }

  .mock-slack-time {
    font-size: 10px;
    color: #B0B0B8;
  }

  .mock-slack-body { padding: 16px; }

  .mock-slack-title {
    font-size: 15px;
    font-weight: 700;
    color: #2E2E38;
    margin-bottom: 4px;
  }

  .mock-slack-subtitle {
    font-size: 11px;
    color: #747480;
    margin-bottom: 16px;
  }

  .mock-slack-user-msg {
    padding: 10px 16px;
    font-size: 13px;
    color: #2E2E38;
    font-family: monospace;
    background: #FFFDE6;
  }

  /* Mock Recommendations */
  .mock-rec {
    background: #F7F7F9;
    border: 2px solid #D0D0D8;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }

  .mock-rec-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .mock-rec-rank {
    display: inline-block;
    background: #2E2E38;
    color: #FFFFFF;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    text-align: center;
    line-height: 20px;
    font-size: 10px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .mock-rec-name {
    font-size: 13px;
    font-weight: 700;
    color: #2E2E38;
  }

  .mock-rec-priority {
    font-size: 9px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: auto;
  }

  .priority-high { background: #FEE2E2; color: #991B1B; }
  .priority-med { background: #FEF3C7; color: #92400E; }
  .priority-low { background: #D1FAE5; color: #065F46; }

  .mock-rec-body {
    font-size: 12px;
    color: #555;
    line-height: 1.5;
    margin-bottom: 4px;
  }

  .mock-rec-prompt {
    font-size: 11px;
    color: #2E2E38;
    background: #FFFDE6;
    padding: 8px 10px;
    border-radius: 6px;
    margin-top: 6px;
    font-style: italic;
    line-height: 1.4;
  }

  .mock-slack-actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid #E7E7EA;
  }

  .mock-btn-thumbs, .mock-btn-action {
    font-size: 11px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: default;
  }

  .mock-btn-thumbs {
    background: #F0F0F4;
    color: #747480;
    border: 1px solid #E7E7EA;
  }

  .mock-btn-action {
    background: #2E2E38;
    color: #FFFFFF;
    border: none;
  }

  /* Mock Sections (Meeting Prep) */
  .mock-section {
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid #F0F0F4;
  }

  .mock-section:last-of-type { border-bottom: none; }

  .mock-section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #2E2E38;
    margin-bottom: 4px;
  }

  .mock-section-body {
    font-size: 12px;
    color: #444;
    line-height: 1.6;
  }

  /* ==============================
     MOCK SCREENS: DASHBOARD
     ============================== */
  .mock-dashboard {
    background: #FFFFFF;
    border: 2px solid #D0D0D8;
    border-radius: 10px;
    overflow: hidden;
  }

  .mock-dash-header {
    padding: 16px 20px;
    background: #2E2E38;
    color: #FFFFFF;
  }

  .mock-dash-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .mock-dash-stats {
    display: flex;
    gap: 24px;
  }

  .mock-stat {
    font-size: 12px;
    color: #C4C4CD;
  }

  .mock-stat strong {
    color: #FFE600;
    font-size: 16px;
    margin-right: 4px;
  }

  .mock-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  .mock-table th {
    background: #F7F7F9;
    padding: 10px 12px;
    text-align: left;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #747480;
    border-bottom: 1px solid #E7E7EA;
  }

  .mock-table td {
    padding: 10px 12px;
    border-bottom: 1px solid #F0F0F4;
    color: #2E2E38;
  }

  .row-critical td { background: #FFF5F5; }

  .risk-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .risk-high { background: #FEE2E2; color: #991B1B; }
  .risk-critical { background: #991B1B; color: #FFFFFF; }
  .risk-medium { background: #FEF3C7; color: #92400E; }
  .risk-low { background: #D1FAE5; color: #065F46; }

  .mock-dash-coaching {
    padding: 14px 20px;
    background: #F7F7F9;
    border-top: 1px solid #E7E7EA;
  }

  /* ==============================
     MOCK SCREENS: PLAYBOOK
     ============================== */
  .mock-playbook {
    display: flex;
    border: 2px solid #D0D0D8;
    border-radius: 10px;
    overflow: hidden;
    min-height: 300px;
  }

  .mock-pb-sidebar {
    width: 240px;
    background: #2E2E38;
    color: #FFFFFF;
    padding: 20px;
    flex-shrink: 0;
  }

  .mock-pb-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .mock-pb-meta {
    font-size: 10px;
    color: #C4C4CD;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.15);
  }

  .mock-pb-toc-item {
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 4px;
    margin-bottom: 2px;
    color: #C4C4CD;
    cursor: default;
  }

  .mock-pb-toc-item.active {
    background: rgba(255, 230, 0, 0.15);
    color: #FFE600;
  }

  .mock-pb-content {
    flex: 1;
    padding: 24px;
  }

  .mock-pb-section-title {
    font-size: 16px;
    font-weight: 700;
    color: #2E2E38;
    margin-bottom: 12px;
  }

  .mock-pb-section-body {
    font-size: 13px;
    color: #444;
    line-height: 1.7;
  }

  .mock-pb-section-body p { margin-bottom: 10px; }

  .mock-pb-actions {
    margin-top: 20px;
    display: flex;
    gap: 8px;
    padding-top: 16px;
    border-top: 1px solid #E7E7EA;
  }

  /* ==============================
     SLIDE 2: FEATURE CARDS
     ============================== */
  .feature-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 8px;
  }

  .feature-card {
    background: #FAFAFA;
    border: 1.5px solid #E7E7EA;
    border-radius: 10px;
    padding: 20px 24px;
    transition: box-shadow 0.2s ease;
  }

  .feature-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }

  .feature-number {
    display: inline-block;
    background: #FFE600;
    color: #2E2E38;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    text-align: center;
    line-height: 24px;
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .feature-name {
    font-size: 15px;
    font-weight: 700;
    color: #2E2E38;
    margin-bottom: 6px;
  }

  .feature-desc {
    font-size: 12px;
    color: #747480;
    line-height: 1.6;
    margin-bottom: 10px;
  }

  .feature-delivery {
    font-size: 10px;
    font-weight: 600;
    color: #B0B0B8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .feature-note {
    margin-top: 20px;
    padding: 14px 20px;
    background: #FFFDE6;
    border: 1px solid #FFE600;
    border-radius: 8px;
    font-size: 12px;
    color: #2E2E38;
    line-height: 1.5;
  }

  /* ==============================
     SLIDE 3: ARCHITECTURE ZONES
     ============================== */
  .arch-zones {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
    margin-top: 8px;
  }

  .arch-zones-row {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
  }

  .arch-zone {
    border: 2.5px dashed #B0B0B8;
    border-radius: 12px;
    padding: 16px 20px;
    position: relative;
  }

  .arch-zone-label {
    position: absolute;
    top: -10px;
    left: 20px;
    background: #FFFFFF;
    padding: 0 10px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  .arch-zone-snowflake {
    border-color: #29B5E8;
    background: #F5FCFF;
  }
  .arch-zone-snowflake .arch-zone-label { color: #0D7FAE; }

  .arch-zone-azure {
    border-color: #0078D4;
    background: #F5F9FE;
  }
  .arch-zone-azure .arch-zone-label { color: #0078D4; }

  .arch-zone-external {
    border-color: #546E7A;
    background: #F7F8F9;
  }
  .arch-zone-external .arch-zone-label { color: #546E7A; }

  .arch-zone-inner {
    display: grid;
    gap: 12px;
  }

  .arch-subzone {
    border: 1.5px solid rgba(0,0,0,0.1);
    border-radius: 8px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.7);
  }

  .arch-subzone-label {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #747480;
    margin-bottom: 6px;
  }

  .arch-zone-arrow {
    display: flex;
    justify-content: center;
    padding: 4px 0;
  }

  .arch-zone-arrow-down {
    width: 0;
    height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 12px solid #2E2E38;
  }

  .arch-zone-arrow-up {
    width: 0;
    height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-bottom: 12px solid #2E2E38;
  }

  .arch-zone-arrow-both {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .arch-zone-arrow-both .arch-zone-arrow-up,
  .arch-zone-arrow-both .arch-zone-arrow-down {
    border-left-width: 7px;
    border-right-width: 7px;
    border-top-width: 8px;
    border-bottom-width: 8px;
  }

  /* ==============================
     SLIDE 3: ARCHITECTURE BOXES (INSIDE ZONES)
     ============================== */
  .arch-stack {
    margin-top: 8px;
  }

  .arch-layer {
    border-radius: 8px;
    padding: 12px 16px 12px 20px;
    border-left: 5px solid #C4C4CD;
    border-top: 1.5px solid #E0E0E4;
    border-right: 1.5px solid #E0E0E4;
    border-bottom: 1.5px solid #E0E0E4;
    background: #F7F7F9;
  }

  /* Layer color variants */
  .arch-consumers    { border-left-color: #1565C0; background: #E8F0FE; }
  .arch-delivery     { border-left-color: #2E7D32; background: #E6F4EA; }
  .arch-api          { border-left-color: #546E7A; background: #ECEFF1; }
  .arch-agents       { border-left-color: #E65100; background: #FFF3E0; }
  .arch-ai-services  { border-left-color: #6A1B9A; background: #F3E5F5; }
  .arch-data-platform{ border-left-color: #F9A825; background: #FFFDE7; }
  .arch-fos-backend  { border-left-color: #00838F; background: #E0F7FA; }
  .arch-ingestion    { border-left-color: #283593; background: #E8EAF6; }
  .arch-sources      { border-left-color: #37474F; background: #ECEFF1; }

  .arch-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: #2E2E38;
    margin-bottom: 8px;
  }

  .arch-row {
    display: flex;
    gap: 10px;
  }

  .arch-row-five {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }

  .arch-box {
    flex: 1;
    background: #FFFFFF;
    border: 2px solid rgba(0,0,0,0.12);
    border-radius: 6px;
    padding: 10px 14px;
  }

  .arch-box-wide { flex: 1; }
  .arch-box-agent { text-align: center; }

  .arch-box-name {
    font-size: 12px;
    font-weight: 700;
    color: #2E2E38;
    margin-bottom: 2px;
  }

  .arch-box-desc {
    font-size: 10px;
    color: #555;
    line-height: 1.4;
  }

  .arch-box-count {
    font-size: 10px;
    font-weight: 600;
    color: #2E2E38;
    margin-top: 4px;
  }

  .arch-box-note {
    font-size: 9px;
    font-style: italic;
    color: #888;
    margin-top: 4px;
  }

  .arch-connector {
    display: flex;
    justify-content: center;
    padding: 3px 0;
  }

  .arch-connector-line {
    width: 0;
    height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 10px solid #2E2E38;
  }

  .arch-infra-row {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    justify-content: center;
  }

  .arch-infra-tag {
    font-size: 9px;
    font-weight: 600;
    padding: 3px 10px;
    background: rgba(255,255,255,0.7);
    border: 1.5px solid rgba(0,0,0,0.15);
    border-radius: 4px;
    color: #555;
  }

  .arch-tiers {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 6px;
    font-size: 11px;
  }

  .arch-tier {
    background: rgba(255,255,255,0.7);
    padding: 2px 10px;
    border-radius: 4px;
    font-weight: 600;
    color: #2E2E38;
    border: 1px solid rgba(0,0,0,0.1);
  }

  .arch-tier-arrow {
    color: #2E2E38;
    font-size: 14px;
    font-weight: 700;
  }

  /* ==============================
     SLIDE 4: DATA PIPELINE (LEFT TO RIGHT)
     ============================== */
  .pipeline-flow {
    display: flex;
    align-items: stretch;
    gap: 0;
    margin-top: 24px;
    overflow-x: auto;
    padding-bottom: 8px;
  }

  .pipeline-stage {
    flex: 1;
    min-width: 140px;
    background: #FAFAFA;
    border: 1.5px solid #E7E7EA;
    border-radius: 10px;
    padding: 16px;
    display: flex;
    flex-direction: column;
  }

  .pipeline-stage-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .pipeline-stage-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #2E2E38;
  }

  .pipeline-stage-count {
    font-size: 10px;
    font-weight: 700;
    background: #FFE600;
    color: #2E2E38;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .pipeline-stage-desc {
    font-size: 11px;
    color: #747480;
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .pipeline-item {
    font-size: 10px;
    color: #2E2E38;
    padding: 4px 0;
    border-top: 1px solid #F0F0F4;
  }

  .pipeline-item-sub {
    font-size: 9px;
    color: #B0B0B8;
  }

  .pipeline-arrow {
    display: flex;
    align-items: center;
    padding: 0 6px;
    flex-shrink: 0;
  }

  .pipeline-arrow-line {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .pipeline-arrow-line span {
    font-size: 16px;
    color: #C4C4CD;
    line-height: 1;
  }

  .pipeline-arrow-label {
    font-size: 8px;
    color: #B0B0B8;
    text-align: center;
    white-space: nowrap;
  }

  .pipeline-schedule {
    margin-top: 24px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .pipeline-schedule-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #747480;
  }

  .pipeline-schedule-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ==============================
     SLIDE 5: DATA MODEL (SCHEMA CARDS)
     ============================== */
  .schema-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-top: 24px;
  }

  .schema-card {
    background: #FAFAFA;
    border: 1.5px solid #E7E7EA;
    border-radius: 10px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: center;
  }

  .schema-card:hover {
    border-color: #FFE600;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  }

  .schema-count {
    font-size: 36px;
    font-weight: 700;
    color: #2E2E38;
    line-height: 1;
    margin-bottom: 4px;
  }

  .schema-tier {
    font-size: 13px;
    font-weight: 700;
    color: #2E2E38;
    margin-bottom: 6px;
  }

  .schema-desc {
    font-size: 11px;
    color: #747480;
    line-height: 1.5;
  }

  .schema-hint {
    font-size: 9px;
    color: #B0B0B8;
    margin-top: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Schema overlay tables */
  .obj-group {
    margin-bottom: 20px;
  }

  .obj-group-header {
    font-size: 12px;
    font-weight: 700;
    color: #2E2E38;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 2px solid #E7E7EA;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .obj-group-count {
    font-size: 10px;
    font-weight: 700;
    background: #F0F0F4;
    color: #747480;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .obj-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
    margin-bottom: 8px;
  }

  .obj-table th {
    text-align: left;
    padding: 6px 10px;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #747480;
    background: #F7F7F9;
    border-bottom: 1px solid #E7E7EA;
  }

  .obj-table td {
    padding: 6px 10px;
    border-bottom: 1px solid #F0F0F4;
    color: #2E2E38;
    vertical-align: top;
  }

  .obj-table td:first-child {
    font-weight: 600;
    white-space: nowrap;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 10px;
  }

  .obj-table td:last-child {
    color: #747480;
  }

  .domain-section {
    margin-bottom: 16px;
  }

  .domain-label {
    font-size: 11px;
    font-weight: 700;
    color: #2E2E38;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .domain-count {
    font-size: 9px;
    font-weight: 700;
    background: #FFE600;
    color: #2E2E38;
    padding: 2px 6px;
    border-radius: 3px;
  }

  .domain-views {
    list-style: none;
    padding: 0;
  }

  .domain-views li {
    font-size: 11px;
    color: #747480;
    padding: 3px 0 3px 14px;
    position: relative;
    line-height: 1.4;
  }

  .domain-views li::before {
    content: '\203A';
    position: absolute;
    left: 0;
    font-weight: 700;
    color: #C4C4CD;
  }

  .join-paths {
    margin-top: 24px;
  }

  .join-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid #F0F0F4;
    font-size: 11px;
  }

  .join-from, .join-to {
    font-weight: 600;
    color: #2E2E38;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 10px;
    background: #F7F7F9;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .join-via {
    color: #747480;
    font-size: 10px;
  }

  .join-arrow-sm {
    color: #C4C4CD;
    font-size: 12px;
  }

  /* ==============================
     SLIDE 6: SEMANTIC VIEWS
     ============================== */
  .semantic-hero {
    background: #FFFDE6;
    border: 2px solid #FFE600;
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 20px;
  }

  .semantic-hero-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #92400E;
    margin-bottom: 6px;
  }

  .semantic-hero-name {
    font-size: 15px;
    font-weight: 700;
    color: #2E2E38;
    margin-bottom: 6px;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  .semantic-hero-desc {
    font-size: 13px;
    color: #747480;
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .semantic-hero-cols {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .semantic-col-group {
    background: #FFFFFF;
    border: 1px solid #E7E7EA;
    border-radius: 6px;
    padding: 10px 12px;
  }

  .semantic-col-group-name {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #747480;
    margin-bottom: 4px;
  }

  .semantic-col-item {
    font-size: 10px;
    color: #2E2E38;
    padding: 1px 0;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 9px;
  }

  .semantic-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }

  .semantic-card {
    background: #FAFAFA;
    border: 1.5px solid #E7E7EA;
    border-radius: 8px;
    padding: 12px 14px;
    transition: box-shadow 0.2s ease;
  }

  .semantic-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.04); }

  .semantic-name {
    font-size: 10px;
    font-weight: 700;
    color: #2E2E38;
    margin-bottom: 4px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    word-break: break-all;
  }

  .semantic-purpose {
    font-size: 10px;
    color: #747480;
    line-height: 1.4;
    margin-bottom: 6px;
  }

  .semantic-agent-tag {
    display: inline-block;
    font-size: 8px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 3px;
    background: #F0F0F4;
    color: #747480;
    margin-right: 3px;
    margin-bottom: 2px;
  }

  .semantic-perf {
    font-size: 9px;
    color: #B0B0B8;
    margin-top: 4px;
  }

  .semantic-rule {
    margin-top: 20px;
    padding: 12px 16px;
    background: #F7F7F9;
    border: 1px solid #E7E7EA;
    border-radius: 8px;
    font-size: 12px;
    color: #2E2E38;
    line-height: 1.5;
  }

  .semantic-rule strong { color: #2E2E38; }

  /* ==============================
     SLIDE 7: AI AGENTS
     ============================== */
  .agent-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-top: 20px;
  }

  .agent-card {
    background: #FAFAFA;
    border: 1.5px solid #E7E7EA;
    border-radius: 10px;
    padding: 16px;
    transition: box-shadow 0.2s ease;
  }

  .agent-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }

  .agent-card-name {
    font-size: 14px;
    font-weight: 700;
    color: #2E2E38;
    margin-bottom: 4px;
  }

  .agent-card-role {
    font-size: 10px;
    font-weight: 600;
    color: #747480;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  .agent-detail {
    margin-bottom: 8px;
  }

  .agent-detail-label {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #B0B0B8;
    margin-bottom: 2px;
  }

  .agent-detail-text {
    font-size: 11px;
    color: #747480;
    line-height: 1.4;
  }

  .agent-writes-to {
    font-size: 10px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: #2E2E38;
    background: #F0F0F4;
    padding: 3px 8px;
    border-radius: 4px;
    display: inline-block;
    margin-top: 4px;
  }

  /* Agent coordination flow */
  .coord-flow {
    margin-top: 24px;
    display: flex;
    align-items: center;
    gap: 0;
    background: #F7F7F9;
    border: 1.5px solid #E7E7EA;
    border-radius: 10px;
    padding: 16px 20px;
  }

  .coord-step {
    flex: 1;
    text-align: center;
  }

  .coord-step-num {
    display: inline-block;
    background: #2E2E38;
    color: #FFFFFF;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    line-height: 22px;
    font-size: 10px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .coord-step-name {
    font-size: 11px;
    font-weight: 700;
    color: #2E2E38;
    margin-bottom: 2px;
  }

  .coord-step-desc {
    font-size: 10px;
    color: #747480;
    line-height: 1.4;
  }

  .coord-arrow {
    font-size: 16px;
    color: #C4C4CD;
    padding: 0 6px;
    flex-shrink: 0;
  }

  .agent-infra-row {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .agent-infra-tag {
    font-size: 10px;
    font-weight: 600;
    padding: 4px 12px;
    background: #F0F0F4;
    border: 1px solid #E7E7EA;
    border-radius: 6px;
    color: #747480;
  }

  /* ==============================
     SLIDE 8: STATUS
     ============================== */
  .status-columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 24px;
  }

  .status-col {
    border: 1.5px solid #E7E7EA;
    border-radius: 10px;
    overflow: hidden;
  }

  .status-col-header {
    padding: 12px 20px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .status-exists .status-col-header {
    background: #D1FAE5;
    color: #065F46;
  }

  .status-build .status-col-header {
    background: #FEF3C7;
    color: #92400E;
  }

  .status-col-body { padding: 16px 20px; }

  .status-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid #F0F0F4;
    font-size: 12px;
    color: #2E2E38;
    line-height: 1.4;
  }

  .status-item:last-child { border-bottom: none; }

  .status-check {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 700;
    margin-top: 1px;
  }

  .status-exists .status-check {
    background: #D1FAE5;
    color: #065F46;
  }

  .status-build .status-check {
    background: #FEF3C7;
    color: #92400E;
  }

  .status-item-text { flex: 1; }

  .status-item-sub {
    font-size: 10px;
    color: #747480;
  }

  /* Metrics row */
  .metrics-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-top: 24px;
  }

  .metric-card {
    background: #FAFAFA;
    border: 1.5px solid #E7E7EA;
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }

  .metric-label {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #747480;
    margin-bottom: 6px;
  }

  .metric-number {
    font-size: 24px;
    font-weight: 700;
    color: #2E2E38;
    margin-bottom: 2px;
  }

  .metric-desc {
    font-size: 10px;
    color: #B0B0B8;
    line-height: 1.4;
  }

  .cost-bar {
    margin-top: 20px;
    padding: 14px 20px;
    background: #2E2E38;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .cost-bar-label {
    font-size: 12px;
    font-weight: 600;
    color: #C4C4CD;
  }

  .cost-bar-amount {
    font-size: 18px;
    font-weight: 700;
    color: #FFE600;
  }

  .cost-bar-note {
    font-size: 10px;
    color: #747480;
  }

  /* ==============================
     DEEP DIVE HUB (SLIDE 9)
     ============================== */
  .dd-tag {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 0.3px;
  }

  .dd-tag-decided { background: #D1FAE5; color: #065F46; }
  .dd-tag-tbd { background: #FEF3C7; color: #92400E; }
  .dd-tag-risk { background: #FEE2E2; color: #991B1B; }
  .dd-tag-info { background: #DBEAFE; color: #1E40AF; }

  .dd-hub-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-top: 20px;
  }

  .dd-hub-card {
    display: block;
    background: #FAFAFA;
    border: 1.5px solid #E7E7EA;
    border-radius: 10px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-decoration: none;
    color: inherit;
  }

  .dd-hub-card:hover {
    border-color: #FFE600;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    transform: translateY(-2px);
  }

  .dd-hub-number {
    display: inline-block;
    background: #2E2E38;
    color: #FFFFFF;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    text-align: center;
    line-height: 24px;
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .dd-hub-title { font-size: 14px; font-weight: 700; color: #2E2E38; margin-bottom: 6px; }
  .dd-hub-desc { font-size: 11px; color: #747480; line-height: 1.5; margin-bottom: 12px; }
  .dd-hub-stat { font-size: 20px; font-weight: 700; color: #2E2E38; }
  .dd-hub-stat-label { font-size: 10px; color: #B0B0B8; }
  .dd-hub-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
  .dd-hub-hint { font-size: 9px; color: #B0B0B8; margin-top: 10px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* ==============================
     RESPONSIVE: LARGE LAPTOPS
     ============================== */
  @media (max-width: 1400px) {
    .slide { padding: 48px 48px 72px; }
    .slide-title { font-size: 36px; }
    .slide-subtitle { font-size: 16px; }
    .semantic-hero-cols { grid-template-columns: repeat(2, 1fr); }
  }

  /* ==============================
     RESPONSIVE: TABLETS / SMALL LAPTOPS
     ============================== */
  @media (max-width: 1024px) {
    .slide { padding: 32px 32px 90px; }
    .slide-scroll { padding-top: 24px; padding-bottom: 100px; }
    .slide-title { font-size: 28px; }
    .slide-subtitle { font-size: 14px; }

    .problem-grid { grid-template-columns: 1fr; }
    .journey-grid { grid-template-columns: 1fr; }
    .feature-grid { grid-template-columns: 1fr; }
    .schema-grid { grid-template-columns: 1fr 1fr; }
    .semantic-grid { grid-template-columns: 1fr 1fr; }
    .semantic-hero-cols { grid-template-columns: 1fr; }
    .agent-row { grid-template-columns: 1fr 1fr; }
    .arch-row-five { grid-template-columns: repeat(3, 1fr); }
    .arch-zones-row { grid-template-columns: 1fr; }
    .dd-hub-grid { grid-template-columns: 1fr 1fr; }
    .status-columns { grid-template-columns: 1fr; }
    .metrics-row { grid-template-columns: 1fr 1fr; }
    .pipeline-flow { flex-direction: column; }
    .pipeline-arrow { transform: rotate(90deg); padding: 6px 0; }

    .overlay-content { padding: 24px; }
    .mock-playbook { flex-direction: column; }
    .mock-pb-sidebar { width: 100%; }
    .mock-dash-stats { flex-wrap: wrap; gap: 12px; }

    .nav-bar { gap: 3px; overflow-x: auto; justify-content: flex-start; padding: 0 12px; }
    .nav-btn { padding: 0 8px; font-size: 9px; flex-shrink: 0; }
    .nav-divider { margin: 0 3px; }
  }

  /* ==============================
     RESPONSIVE: PHONES
     ============================== */
  @media (max-width: 640px) {
    .slide { padding: 20px 16px 80px; }
    .slide-title { font-size: 22px; }
    .slide-subtitle { font-size: 13px; }
    .slide-badge, .slide-badge-outline { font-size: 9px; padding: 3px 10px; }
    .closing-line { font-size: 14px; }
    .schema-grid { grid-template-columns: 1fr; }
    .semantic-grid { grid-template-columns: 1fr; }
    .agent-row { grid-template-columns: 1fr; }
    .metrics-row { grid-template-columns: 1fr; }
    .dd-hub-grid { grid-template-columns: 1fr; }
    .coord-flow { flex-direction: column; }
    .coord-arrow { transform: rotate(90deg); }
    .overlay-flow { flex-direction: column; }
    .flow-arrow { transform: rotate(90deg); padding: 4px 0; }
    .nav-bar { height: 48px; }
    .nav-btn { height: 34px; font-size: 8px; }
    .nav-arrow { width: 34px; height: 34px; font-size: 16px; }
  }
</style>
</head>
<body>

<!-- Deck container -->
<div class="deck" id="deck"></div>

<!-- Navigation Bar -->
<div class="nav-bar">
  <button class="nav-arrow" onclick="goToSlide(currentSlide - 1)">&#8592;</button>
  <div class="nav-divider"></div>
  <button class="nav-btn active" id="nav-1" onclick="goToSlide(0)">Problem</button>
  <button class="nav-btn" id="nav-2" onclick="goToSlide(1)">Journeys</button>
  <button class="nav-btn" id="nav-3" onclick="goToSlide(2)">Solution</button>
  <button class="nav-btn" id="nav-4" onclick="goToSlide(3)">Architecture</button>
  <button class="nav-btn" id="nav-5" onclick="goToSlide(4)">Data Pipeline</button>
  <button class="nav-btn" id="nav-6" onclick="goToSlide(5)">Data Model</button>
  <button class="nav-btn" id="nav-7" onclick="goToSlide(6)">Semantic</button>
  <button class="nav-btn" id="nav-8" onclick="goToSlide(7)">AI Agents</button>
  <button class="nav-btn" id="nav-9" onclick="goToSlide(8)">Deep Dives</button>
  <button class="nav-btn" id="nav-10" onclick="goToSlide(9)">Gaps</button>
  <div class="nav-divider"></div>
  <span class="nav-label" id="nav-counter">1 / 10</span>
  <div class="nav-divider"></div>
  <button class="nav-arrow" onclick="goToSlide(currentSlide + 1)">&#8594;</button>
</div>

<script>
let currentSlide = 0;
const totalSlides = 10;

const slideFiles = [
  'slides/slide0-problem.html',
  'slides/slide1-journeys.html',
  'slides/slide2-solution.html',
  'slides/slide3-architecture.html',
  'slides/slide4-data-pipeline.html',
  'slides/slide5-data-model.html',
  'slides/slide6-semantic.html',
  'slides/slide7-agents.html',
  'slides/slide9-deepdives.html',
  'slides/slide10-gaps.html'
];

async function loadDeck() {
  const deck = document.getElementById('deck');
  try {
    const slidePromises = slideFiles.map(file =>
      fetch(file)
        .then(r => {
          if (!r.ok) throw new Error(`Failed to load ${file}: ${r.status}`);
          return r.text();
        })
        .catch(err => {
          console.error(`Error loading ${file}:`, err);
          return `<div style="padding:40px;color:#991B1B;background:#FEE2E2;border-radius:8px;"><strong>Error loading ${file}</strong><br><br>If you are opening this from your computer (file://), please serve it from a local web server instead:<br><br><code>cd /Users/srirajkadimisetty/Downloads/storybook && python3 -m http.server 8000</code><br><br>Then open: <strong>http://localhost:8000/FOS-storybook.html</strong></div>`;
        })
    );
    const slideContents = await Promise.all(slidePromises);
    deck.innerHTML = slideContents.join('\n');

    // Move overlays out of the deck to body.
    // CSS transform on .deck breaks position:fixed inside it.
    var overlays = deck.querySelectorAll('.overlay');
    overlays.forEach(function(o) {
      document.body.appendChild(o);
    });
  } catch (error) {
    console.error('Error loading deck:', error);
    document.getElementById('deck').innerHTML = '<div style="padding:40px;color:#991B1B;background:#FEE2E2;border-radius:8px;"><strong>Failed to load storybook</strong><br><br>Please serve from a local web server instead of opening directly from your computer.</div>';
  }
}

function goToSlide(n) {
  if (n < 0 || n >= totalSlides) return;
  currentSlide = n;
  document.getElementById('deck').style.transform = 'translateX(-' + (n * 100) + 'vw)';
  for (let i = 1; i <= totalSlides; i++) {
    document.getElementById('nav-' + i).classList.remove('active');
  }
  document.getElementById('nav-' + (n + 1)).classList.add('active');
  document.getElementById('nav-counter').textContent = (n + 1) + ' / ' + totalSlides;
}

function openOverlay(id) {
  document.getElementById(id).classList.add('active');
}

function closeOverlay(id) {
  document.getElementById(id).classList.remove('active');
}

document.addEventListener('keydown', function(e) {
  // Close any open overlay on Escape
  if (e.key === 'Escape') {
    var overlays = document.querySelectorAll('.overlay.active');
    overlays.forEach(function(o) { o.classList.remove('active'); });
    return;
  }
  // Don't navigate slides if an overlay is open
  var anyOverlay = document.querySelector('.overlay.active');
  if (anyOverlay) return;

  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); goToSlide(currentSlide + 1); }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); goToSlide(currentSlide - 1); }
});

// Close overlay when clicking outside the content
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('overlay') && e.target.classList.contains('active')) {
    e.target.classList.remove('active');
  }
});

loadDeck();
</script>

</body>
</html>
